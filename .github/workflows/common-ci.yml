name: Common CI

on:
  push:
    branches:
      - main
    paths:
      - commitlint.config.js
      - package.json
      - package-lock.json
      - .github/workflows/common-ci.yml
  pull_request:
    paths:
      - commitlint.config.js
      - package.json
      - package-lock.json
      - .github/workflows/common-ci.yml

concurrency:
  group: common-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint commit messages (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Lint commit messages (push)
        if: ${{ github.event_name == 'push' }}
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          NULL_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE_SHA" = "$NULL_SHA" ]; then
            BEFORE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          npx commitlint --from "$BEFORE_SHA" --to "${{ github.sha }}" --verbose
