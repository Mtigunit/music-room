pre-commit:
  parallel: true
  jobs:
    - name: mobile analyze
      glob: "mobile/**"
      run: cd mobile && flutter analyze

    - name: backend lint
      glob: "backend/**"
      run: cd backend && npm run lint

    - name: backend format
      glob: "backend/**"
      run: cd backend && npm run format:check

pre-push:
  parallel: true
  jobs:
    - name: prevent push to main
      run: sh scripts/prevent-push-to-main.sh

    - name: branch name check
      run: sh scripts/check-branch-name.sh

    - name: mobile test
      glob: "mobile/**"
      run: cd mobile && if find test -type f -name "*_test.dart" | grep -q .; then flutter test; else echo "No Flutter tests found in mobile/test. Skipping mobile test."; fi

    - name: backend lint
      glob: "backend/**"
      run: cd backend && npm run lint

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}