<!doctype html>
<html lang="en">
  <head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />
    <meta name="google-signin-client_id" content="GOOGLE_SIGNIN_CLIENT_ID_PLACEHOLDER" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="mobile" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <title>mobile</title>
    <link rel="manifest" href="manifest.json" />

    <script src="config.js"></script>
    <script>
      (function () {
        var clientId = 'GOOGLE_SIGNIN_CLIENT_ID_PLACEHOLDER';

        if (
          window.GOOGLE_SIGNIN_CLIENT_ID &&
          window.GOOGLE_SIGNIN_CLIENT_ID !== 'GOOGLE_SIGNIN_CLIENT_ID_PLACEHOLDER'
        ) {
          clientId = window.GOOGLE_SIGNIN_CLIENT_ID;
        }

        if (clientId && clientId !== 'GOOGLE_SIGNIN_CLIENT_ID_PLACEHOLDER') {
          var meta = document.querySelector('meta[name="google-signin-client_id"]');
          if (meta) {
            meta.setAttribute('content', clientId);
          }
        } else {
          console.warn(
            'Google sign-in client id is missing. Ensure GOOGLE_SIGNIN_CLIENT_ID_PLACEHOLDER is replaced or window.GOOGLE_SIGNIN_CLIENT_ID is set.'
          );
        }
      })();
    </script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
      (function () {
        // Google Maps API key placeholder to be replaced at build/deploy time
        // or injected dynamically at runtime via window.GOOGLE_MAPS_API_KEY.
        var apiKey = 'GOOGLE_MAPS_API_KEY_PLACEHOLDER';

        if (
          window.GOOGLE_MAPS_API_KEY &&
          window.GOOGLE_MAPS_API_KEY !== 'GOOGLE_MAPS_API_KEY_PLACEHOLDER'
        ) {
          apiKey = window.GOOGLE_MAPS_API_KEY;
        }

        if (apiKey && apiKey !== 'GOOGLE_MAPS_API_KEY_PLACEHOLDER') {
          var script = document.createElement('script');
          script.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey;
          script.async = true;
          script.defer = true;
          document.head.appendChild(script);
        } else {
          console.warn(
            'Google Maps API key is missing. Ensure GOOGLE_MAPS_API_KEY_PLACEHOLDER is replaced or window.GOOGLE_MAPS_API_KEY is set.'
          );
        }
      })();
    </script>
  </head>
  <body>
    <!--
      You can customize the "flutter_bootstrap.js" script.
      This is useful to provide a custom configuration to the Flutter loader
      or to give the user feedback during the initialization process.

      For more details:
      * https://docs.flutter.dev/platform-integration/web/initialization
    -->
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
