name: Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - mobile/**
      - .github/workflows/mobile-ci.yml
  pull_request:
    paths:
      - mobile/**
      - .github/workflows/mobile-ci.yml

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.2
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p assets

          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > assets/.env
          else
            touch assets/.env
          fi

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.2
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p assets

          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > assets/.env
          else
            touch assets/.env
          fi

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.2
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p assets

          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > assets/.env
          else
            touch assets/.env
          fi

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run tests
        run: |
          if find test -type f -name "*_test.dart" | grep -q .; then
            flutter test
          else
            echo "No Flutter tests found in mobile/test. Skipping tests."
          fi

  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.2
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p assets

          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > assets/.env
          else
            touch assets/.env
          fi

      - name: Verify lockfile is present
        run: test -f pubspec.lock

      - name: Verify lockfile is in sync
        run: |
          flutter pub get --enforce-lockfile
          git diff --exit-code -- pubspec.lock

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.41.2
          cache: true

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p assets

          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > assets/.env
          else
            touch assets/.env
          fi

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build web
        run: flutter build web --release

  pr-summary:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [format, analyze, test, lockfile, web-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Post mobile CI summary comment
        uses: actions/github-script@v7
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TEST_RESULT: ${{ needs.test.result }}
          LOCKFILE_RESULT: ${{ needs.lockfile.result }}
          WEB_BUILD_RESULT: ${{ needs.web-build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- ci-mobile-summary -->';
            const jobs = [
              ['Format', process.env.FORMAT_RESULT],
              ['Analyze', process.env.ANALYZE_RESULT],
              ['Test', process.env.TEST_RESULT],
              ['Lockfile', process.env.LOCKFILE_RESULT],
              ['Web build', process.env.WEB_BUILD_RESULT],
            ];

            const icon = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              if (result === 'cancelled') return '⚪';
              return '⏭️';
            };

            const failed = jobs.filter(([, result]) => result !== 'success');
            const heading = failed.length === 0
              ? '### Mobile CI passed'
              : `### Mobile CI failed (${failed.map(([name]) => name).join(', ')})`;

            const lines = jobs.map(([name, result]) => `- ${icon(result)} ${name}: ${result}`);
            const body = [
              marker,
              heading,
              ...lines,
              '',
              `[View workflow run](${process.env.RUN_URL})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
