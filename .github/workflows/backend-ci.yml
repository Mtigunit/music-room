name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint Test Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json


      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --ci --runInBand

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: build-and-test
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 1. Navigate to the project directory on your server
            cd /${{ secrets.SERVER_USER }}/music-room

            # 2. Pull the latest code from GitHub
            git fetch origin main
            git reset --hard origin/main

            # 3. Rebuild and restart the Docker containers in the background
            docker compose -f docker-compose.yml up -d --build

            # 4. Cleanup: Remove old, unused Docker images to save disk space
            docker image prune -f