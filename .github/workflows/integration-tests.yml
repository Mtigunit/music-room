name: Backend Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/integration-tests.yml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/integration-tests.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-verify:
    name: E2E and Stress Tests
    runs-on: ubuntu-latest

    # 1. Provide the throwaway Service Containers
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: musicroom_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    # 2. Inject test-environment configurations overriding any .env files
    env:
      NODE_ENV: test
      API_PORT: 3000
      API_URL: "http://127.0.0.1:3000"
      WS_URL: "http://127.0.0.1:3000"
      # DB Connection
      DATABASE_URL: "postgresql://root:password@localhost:5432/musicroom_ci?schema=public"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: musicroom_ci
      # Redis Connection
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # Security & Provider Keys
      JWT_SECRET: "ci_super_secret_temporary_key_for_testing"
      GOOGLE_CLIENT_ID: "ci-mock-google-client-id"
      YOUTUBE_API_KEY: "ci-mock-youtube-api-key"
      DB_TRANSACTION_TIMEOUT: 15000
      DB_HEAVY_TRANSACTION_TIMEOUT: 30000
      # Rate Limiting (Accelerated for CI speed and cross-test isolation)
      RATE_LIMIT_DEFAULT_TTL_MS: 1000
      RATE_LIMIT_DEFAULT_LIMIT: 50
      RATE_LIMIT_WS_TTL_MS: 1000
      RATE_LIMIT_WS_LIMIT: 30
      RATE_LIMIT_AUTH_TTL_MS: 1000
      RATE_LIMIT_AUTH_LIMIT: 10
      RATE_LIMIT_SEARCH_TTL_MS: 1000
      RATE_LIMIT_SEARCH_LIMIT: 30
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🏗️ Push Temporary Schema
        run: npx prisma db push

      - name: 🔧 Inject DEFERRABLE Constraint (mirrors prisma-reset.js)
        run: |
          npx prisma db execute --stdin <<'SQL'
          DO $$
          DECLARE
            constraint_record RECORD;
            index_record RECORD;
          BEGIN
            -- Convert any existing non-deferrable unique constraint on (playlistId, position)
            FOR constraint_record IN
              SELECT
                ns.nspname AS schema_name,
                cls.relname AS table_name,
                con.conname AS constraint_name
              FROM pg_constraint con
              INNER JOIN pg_class cls ON cls.oid = con.conrelid
              INNER JOIN pg_namespace ns ON ns.oid = cls.relnamespace
              INNER JOIN LATERAL (
                SELECT array_agg(att.attname ORDER BY key_cols.ordinality) AS column_names
                FROM unnest(con.conkey) WITH ORDINALITY AS key_cols(attnum, ordinality)
                INNER JOIN pg_attribute att
                  ON att.attrelid = con.conrelid AND att.attnum = key_cols.attnum
              ) cols ON TRUE
              WHERE con.contype = 'u'
                AND NOT con.condeferrable
                AND ns.nspname = current_schema()
                AND cols.column_names = ARRAY['playlistId', 'position']::name[]
            LOOP
              EXECUTE format(
                'ALTER TABLE %I.%I DROP CONSTRAINT %I',
                constraint_record.schema_name, constraint_record.table_name, constraint_record.constraint_name
              );
              EXECUTE format(
                'ALTER TABLE %I.%I ADD CONSTRAINT %I UNIQUE ("playlistId", "position") DEFERRABLE INITIALLY DEFERRED',
                constraint_record.schema_name, constraint_record.table_name, constraint_record.constraint_name
              );
            END LOOP;

            -- Convert any standalone unique index (not backed by a constraint)
            FOR index_record IN
              SELECT schemaname AS schema_name, tablename AS table_name, indexname AS index_name
              FROM pg_indexes
              WHERE schemaname = current_schema()
                AND indexdef ILIKE 'CREATE UNIQUE INDEX % ON % ("playlistId", "position")%'
            LOOP
              IF NOT EXISTS (
                SELECT 1 FROM pg_constraint con
                INNER JOIN pg_class cls ON cls.oid = con.conrelid
                INNER JOIN pg_namespace ns ON ns.oid = cls.relnamespace
                WHERE con.contype = 'u'
                  AND con.conname = index_record.index_name
                  AND cls.relname = index_record.table_name
                  AND ns.nspname = index_record.schema_name
              ) THEN
                EXECUTE format('DROP INDEX %I.%I', index_record.schema_name, index_record.index_name);
                EXECUTE format(
                  'ALTER TABLE %I.%I ADD CONSTRAINT %I UNIQUE ("playlistId", "position") DEFERRABLE INITIALLY DEFERRED',
                  index_record.schema_name, index_record.table_name, index_record.index_name
                );
              END IF;
            END LOOP;
          END
          $$;
          SQL

      - name: 🔨 Build Production Application
        run: npm run build

      - name: 🚀 Boot Backend in Background
        run: |
          npm run start:prod &
          # Install wait-on to pause until the server responds to PINGs
          npx wait-on -t 60000 http://127.0.0.1:3000/

      - name: 🧪 Run Standard E2E Tests (Optional, if Jest E2E is set up)
        run: npm run test:e2e

      - name: 🧪 Run Playlist Drag-and-Drop Simulator
        run: npx ts-node --transpileOnly ./scripts/e2e/playlist-editor.e2e.ts

      - name: 🧪 Run Real-Time WebSocket OCC Sync Test
        run: npx ts-node --transpileOnly ./scripts/e2e/playlist-occ-ws-sync.e2e.ts

      - name: 💥 Run High-Load OCC Chaos Stress Test
        run: npx ts-node --transpileOnly ./scripts/stress/playlist-concurrency.load.ts
